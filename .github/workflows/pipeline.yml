name: AI Content Pipeline

on:
  schedule:
    # Every 3 days at 11:20 UTC (~4:50 PM IST). Change the cron to run more often, e.g. daily:
    # `20 11 * * *` = every day at 11:20 UTC
    - cron: "20 11 */3 * *"
  workflow_dispatch: # Manual trigger from GitHub UI

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
  LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
  LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
  AUTO_APPROVE: "true"
  FETCH_WINDOW_HOURS: "72"
  MIN_SCORE_TO_POST: "0.35"
  POST_INTERVAL_DAYS: "3"
  IMAGE_COUNT: "3"
  # Optional: digest email — comma-separated OK, e.g. "a@gmail.com, b@gmail.com"
  SMTP_USER: ${{ secrets.SMTP_USER }}
  SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
  DIGEST_TO_EMAIL: ${{ secrets.DIGEST_TO_EMAIL }}

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Initialize database tables
        run: python scripts/init_db.py

      - name: Seed sources
        run: python scripts/seed_sources.py

      - name: Run pipeline
        id: pipeline
        run: python scripts/run_pipeline_ci.py

      - name: Check if draft was created
        id: check
        run: |
          if [ -f "draft_caption.txt" ] && [ -f "draft_meta.json" ]; then
            echo "has_draft=true" >> $GITHUB_OUTPUT
          else
            echo "has_draft=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload generated assets
        if: steps.check.outputs.has_draft == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: post-assets-${{ steps.pipeline.outputs.draft_id }}
          path: |
            generated_assets/
            draft_caption.txt
            draft_meta.json
          retention-days: 30

      - name: Create review issue
        if: steps.check.outputs.has_draft == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            const caption = fs.readFileSync('draft_caption.txt', 'utf8');
            const meta = JSON.parse(fs.readFileSync('draft_meta.json', 'utf8'));

            const body = [
              '## New LinkedIn Draft Ready for Review',
              '',
              `**Draft ID:** ${meta.draft_id}`,
              `**Topic:** ${meta.topic}`,
              `**Score:** ${meta.score}`,
              `**Images:** ${meta.asset_count} (${meta.image_strategy})`,
              '',
              '---',
              '',
              '### Caption Preview',
              '',
              '```',
              caption,
              '```',
              '',
              '---',
              '',
              '### How to publish',
              '1. Review the caption above',
              '2. Add the `approve` label to this issue to publish',
              '3. Or close this issue to skip',
              '',
              `> Draft ID: ${meta.draft_id} | Run: ${process.env.GITHUB_RUN_ID}`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Draft] ${meta.hook.substring(0, 80)}`,
              body: body,
              labels: ['draft', 'pending-review'],
            });

      - name: Summary
        if: always()
        run: |
          echo "## Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.pipeline.outputs.status || 'unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Draft ID:** ${{ steps.pipeline.outputs.draft_id || 'none' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Draft created:** ${{ steps.check.outputs.has_draft }}" >> $GITHUB_STEP_SUMMARY
